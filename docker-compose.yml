services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gymtracker
      POSTGRES_PASSWORD: gymtracker
      POSTGRES_DB: gymtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymtracker"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gymtracker:gymtracker@postgres:5432/gymtracker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: gymtracker
      AUTH_MODE: local
      JWT_SECRET: dev-secret-change-in-production
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FRONTEND_ORIGIN: http://localhost:3000
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
