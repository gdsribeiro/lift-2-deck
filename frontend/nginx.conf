map $uri $cache_control {
    ~^/app/assets/  "public, max-age=31536000, immutable";
    ~\.svg$         "public, max-age=31536000, immutable";
    ~\.png$         "public, max-age=31536000, immutable";
    default         "";
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 256;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cache-Control $cache_control;

    # Landing page
    location = / {
        try_files /landing.html =404;
    }

    # Redirect /app to /app/
    location = /app {
        return 301 /app/;
    }

    # PWA manifest
    location = /app/manifest.webmanifest {
        types { }
        default_type application/manifest+json;
    }

    # Service worker — no cache
    location ~* ^/app/(sw|registerSW)\.js$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # React SPA
    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # Shared assets (used by landing page and app)
    location /assets/ {
        alias /usr/share/nginx/html/app/assets/;
    }

    # Static files at root (favicon, etc.)
    location / {
        try_files $uri =404;
    }
}
