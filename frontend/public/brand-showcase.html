<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiftDeck — Brand Showcase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --color-primary: #6366f1; --color-primary-bright: #818cf8; --color-accent: #ffffff; --color-text: #f5f5f3; --color-text-muted: #78716c; --color-bg: #0a0b09; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--color-bg); color: var(--color-text); font-family: 'Inter', sans-serif; padding: 2rem; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; }
    h1 span { color: var(--color-primary-bright); }
    .subtitle { color: var(--color-text-muted); margin-bottom: 3rem; font-size: 0.875rem; }
    .section { margin-bottom: 3rem; }
    .section h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; color: var(--color-accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #222; }
    .row { display: flex; gap: 3rem; align-items: center; flex-wrap: wrap; margin-bottom: 2rem; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .item label { font-size: 0.7rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .checker { background: repeating-conic-gradient(#1a1a1a 0% 25%, #111 0% 50%) 0 0 / 16px 16px; padding: 1.5rem; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; }
    .checker--light { background: repeating-conic-gradient(#e5e5e5 0% 25%, #fff 0% 50%) 0 0 / 16px 16px; }
    .logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; display: inline-flex; align-items: center; gap: 0.5rem; line-height: 1; }
    .logo-text span { color: var(--color-primary-bright); }
    .hero-stack { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .hero-stack .name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 2.25rem; line-height: 1; letter-spacing: -0.02em; }
    .hero-stack .name span { color: var(--color-primary-bright); }
    .hero-stack .abbr { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 0.75rem; color: var(--color-text-muted); letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>

<h1>Lift<span>Deck</span></h1>
<p class="subtitle">Brand Showcase — todas as variantes do logo LD</p>

          <rect x="21" y="26" width="3" height="12" rx="1" fill="#ffffff"/>
          <rect x="25" y="24" width="3" height="16" rx="1" fill="#ffffff"/>
          <rect x="36" y="24" width="3" height="16" rx="1" fill="#ffffff"/>
          <rect x="40" y="26" width="3" height="12" rx="1" fill="#ffffff"/>
        </svg>
      </div>

    </div>
    <div class="item">
      <div class="checker--light checker">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="11" y="4" width="42" height="56" rx="5" stroke="#6366f1" stroke-width="2.5" fill="none"/>
          <path d="M21,12 L18,16 L20,16 L20,19 L22,19 L22,16 L24,16 Z" fill="#ffffff"/>
